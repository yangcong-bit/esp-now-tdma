version: 1.0.2
description: 'A TDMA MAC layer for ESP-NOW on ESP32-S3 with Adaptive Frequency Hopping
  (AFH). Provides deterministic time-slotted access, NFC OOB provisioning support,
  and automatic PER-based channel hopping between 2.4 GHz channels 1/6/11. Payload-agnostic:
  the user defines and owns all application data structures.'
license: Apache-2.0
dependencies:
  idf: '>=5.0.0'
  espressif/esp-now:
    version: '*'
url: https://github.com/yangcong-bit/esp-now-tdma
